<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Admisiones - Liceo Mixto Emperador de Cali</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1, h2 {
            text-align: center;
            color: #2C3E50;
        }
        form {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background-color: #f9f9f9;
        }
        label {
            display: block;
            margin: 10px 0 5px;
        }
        input[type="text"], input[type="email"], input[type="date"], input[type="number"], select, textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }
        input[type="radio"], input[type="checkbox"] {
            margin-right: 20px;
        }
        button {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #2C3E50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }
        button:hover {
            background-color: #34495E;
        }
    </style>
</head>
<body>
    <h1>Liceo Mixto Emperador de Cali</h1>
    <h2>Formulario de Admisiones</h2>
    <form>
        <fieldset>
            <h2>Información Personal del Estudiante</h2>
            <label for="nombres">Nombres:</label>
            <input type="text" id="nombres" name="nombres" required>
            
            <label for="apellidos">Apellidos:</label>
            <input type="text" id="apellidos" name="apellidos" required>
            
            <label for="fecha_nacimiento">Fecha de Nacimiento:</label>
            <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>
            
            <label for="genero">Género:</label>
            <input type="radio" id="genero_m" name="genero" value="masculino" required> Masculino
            <input type="radio" id="genero_f" name="genero" value="femenino" required> Femenino
            
            <label for="documento_identidad">Documento de Identidad:</label>
            <input type="text" id="documento_identidad" name="documento_identidad" required>
            
            <label for="direccion">Dirección:</label>
            <input type="text" id="direccion" name="direccion" required>
            
            <label for="telefono">Teléfono:</label>
            <input type="text" id="telefono" name="telefono" required>
            
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required>
        </fieldset>

        <fieldset>
            <legend>Información Académica</legend>
            <label for="grado_aplicar">Grado al que aplica:</label>
            <select id="grado_aplicar" name="grado_aplicar" required>
                <option value="preescolar">Preescolar</option>
                <option value="primero">Primero</option>
                <option value="segundo">Segundo</option>
                <option value="tercero">Tercero</option>
                <option value="cuarto">Cuarto</option>
                <option value="quinto">Quinto</option>
                <option value="sexto">Sexto</option>
                <option value="septimo">Séptimo</option>
                <option value="octavo">Octavo</option>
                <option value="noveno">Noveno</option>
                <option value="decimo">Décimo</option>
                <option value="once">Once</option>
            </select>
            
            <label for="ultimo_colegio">Último colegio al que asistió:</label>
            <input type="text" id="ultimo_colegio" name="ultimo_colegio" required>
            
            <label for="rendimiento_academico">Rendimiento Académico:</label>
            <textarea id="rendimiento_academico" name="rendimiento_academico" rows="4" required></textarea>
        </fieldset>

        <fieldset>
            <legend>Información de Salud</legend>
            <label for="eps">EPS:</label>
            <input type="text" id="eps" name="eps" required>
            
            <label for="condiciones_medicas">Condiciones Médicas Especiales:</label>
            <textarea id="condiciones_medicas" name="condiciones_medicas" rows="4" required></textarea>
            
            <label for="alergias">Alergias:</label>
            <textarea id="alergias" name="alergias" rows="4" required></textarea>
            
            <label for="medicamentos">Medicamentos:</label>
            <textarea id="medicamentos" name="medicamentos" rows="4" required></textarea>
        </fieldset>

        <fieldset>
            <legend>Información del Hogar</legend>
            <label for="nombre_padre">Nombre del Padre:</label>
            <input type="text" id="nombre_padre" name="nombre_padre" required>
            
            <label for="telefono_padre">Teléfono del Padre:</label>
            <input type="text" id="telefono_padre" name="telefono_padre" required>
            
            <label for="nombre_madre">Nombre de la Madre:</label>
            <input type="text" id="nombre_madre" name="nombre_madre" required>
            
            <label for="telefono_madre">Teléfono de la Madre:</label>
            <input type="text" id="telefono_madre" name="telefono_madre" required>
            
            <label for="otros_acudientes">Otros Acudientes:</label>
            <textarea id="otros_acudientes" name="otros_acudientes" rows="4"></textarea>
        </fieldset>

        <fieldset>
            <legend>Información Adicional</legend>
            <label for="motivo_inscripcion">Motivo de la Inscripción:</label>
            <textarea id="motivo_inscripcion" name="motivo_inscripcion" rows="4" required></textarea>
            
            <label for="expectativas">Expectativas del Colegio:</label>
            <textarea id="expectativas" name="expectativas" rows="4" required></textarea>
        </fieldset>

        <button type="submit">Enviar Solicitud</button>
    </form>
</body>
</html>
